# ============================================
# frpc (客户端) 配置文件 — LanTransfer 内网穿透
# 将此文件放在 frpc.exe 同目录，运行 start-frpc.bat
# ============================================

# 服务器地址（填你的 VPS 公网 IP 或域名）
serverAddr = "你的服务器IP"
serverPort = 7000

# 认证 Token（与 frps 端保持一致）
auth.token = "your-shared-token-here"

# 通信协议
protocol = "tcp"

# ============================================
# 代理: 将本机 3000 端口映射到公网
# ============================================
[[proxies]]
name = "lantransfer-web"
type = "tcp"
localIP = "127.0.0.1"
localPort = 3000
remotePort = 3000