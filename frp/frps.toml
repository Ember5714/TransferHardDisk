# ============================================
# frps (服务端) 参考配置 — 部署在 VPS 上
# 运行: frps.exe -c frps.toml
# ============================================

bindAddr = "0.0.0.0"
bindPort = 7000

# 认证 Token（与 frpc 端保持一致）
auth.token = "your-shared-token-here"

# 允许的端口范围
allowPorts = [
  { start = 3000, end = 3000 },
  { start = 8000, end = 9000 }
]

# 仪表盘
webServer.addr = "0.0.0.0"
webServer.port = 7500
webServer.user = "admin"
webServer.password = "admin"

# 日志
log.to = "./frps.log"
log.level = "info"
log.maxDays = 7