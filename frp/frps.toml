bindAddr = "0.0.0.0"
bindPort = 7000

# 认证 Token（与 frpc 端保持一致，已自动生成强随机值）
auth.token = "34363f75952603f1110df4be3c6aae8209a870fd7373f7fbac235cf664941efe"

# 允许的端口范围
